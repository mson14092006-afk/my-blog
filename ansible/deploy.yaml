- name: Deploy Flask Blog to VPS
  hosts: vps # Group trong file inventory 
  become: true # Chạy các lệnh với quyền root (sudo)

  # Các biến được định nghĩa trong playbook
  vars: 
    app_dir: /opt/my-blog # Thư mục chứa ứng dụng Blog trên VPS
    docker_image: ghcr.io/mson14092006-afk/my-blog:latest

  tasks:
    - name: Install Docker
      apt:
        name: [docker.io, docker-compose] # sudo apt install docker.io docker-compose
        state: present
        update_cache: true # sudo apt update

    - name: Ensure app directory
      file:
        path: "{{ app_dir }}" # /opt/my-blog
        state: directory # đảm bảo thư mục tồn tạo (mkdir -p /opt/my-blog nếu chưa tồn tại, nếu đã tồn tại thì không làm gì)
        mode: "0755" #  sudo chmod 755 /opt/my-blog
    - name: Copy docker-compose
      copy: # đảm bảo docker-compose.prod.yaml đã tồn tại trên VPS
        src: ../docker-compose.prod.yaml
        dest: "{{ app_dir }}/docker-compose.yml"

    - name: Pull latest image
      community.docker.docker_image: # pull the latest image from GitHub Container Registry
        name: "{{ docker_image }}"
        source: pull

    - name: Start services
      community.docker.docker_compose: # cd /opt/my-blog && sudo docker-compose up -d
        project_src: "{{ app_dir }}"
        state: present

