<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ config.BLOG_TITLE }}{% endblock %}</title>
  <meta name="description" content="{{ config.BLOG_DESCRIPTION }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ url_for('main.home') }}" class="nav-logo">
        <span class="logo-bracket">[</span>son<span class="logo-dot">@</span>blog<span class="logo-bracket">]</span>
      </a>
      <div class="nav-links">
        <a href="{{ url_for('main.home') }}" class="nav-link {% if request.endpoint == 'main.home' %}active{% endif %}">home</a>
        <a href="{{ url_for('blog.index') }}" class="nav-link {% if request.blueprint == 'blog' and request.endpoint != 'blog.manage' and request.endpoint != 'blog.new_post' and request.endpoint != 'blog.edit_post' %}active{% endif %}">blog</a>
        <a href="{{ url_for('blog.manage') }}" class="nav-link {% if request.endpoint in ['blog.manage', 'blog.new_post', 'blog.edit_post'] %}active{% endif %}">edit blog</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
       <span class="footer-text">Son Nguyen</span>
       <span class="footer-stack">DevOps Intern</span>
    </div>
  </footer>
</body>
</html>
